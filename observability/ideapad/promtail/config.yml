server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL:-http://druva:3100/loki/api/v1/push}

scrape_configs:
  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: ideapad
          __path__: /var/log/{syslog,auth.log,kern.log,dpkg.log}

  # Docker container logs (auto-discovers all containers)
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: ideapad
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - docker: {}
      - labeldrop:
          - filename
