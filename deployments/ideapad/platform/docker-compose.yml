name: platform

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    cpuset: "1-3"
    container_name: postgres
    restart: unless-stopped
    mem_limit: 2g
    networks:
      - platform
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - /data/docker/postgres:/var/lib/postgresql/data
      - ./services/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./services/postgres/config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    cpuset: "1-3"
    container_name: postgres-exporter
    restart: unless-stopped
    networks:
      - platform
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}?sslmode=disable"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "true"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/postgres/exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    command:
      - "--extend.query-path=/etc/postgres_exporter/queries.yaml"
      - "--disable-default-metrics"
      - "--no-collector.stat_bgwriter"

  # ---------------------------------------------------------------------------
  # Add more services below, e.g.:
  # ---------------------------------------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   container_name: platform-redis
  #   restart: unless-stopped
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - platform
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  postgres_data:
  # redis_data:

networks:
  platform:
    name: platform
    driver: bridge
