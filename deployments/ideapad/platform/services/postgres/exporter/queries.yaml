pg_up:
  query: "SELECT 1 as up"
  metrics:
    - up:
        usage: "GAUGE"

pg_database:
  query: |
    SELECT
      datname,
      numbackends,
      xact_commit,
      xact_rollback,
      blks_read,
      blks_hit
    FROM pg_stat_database
  metrics:
    - datname:
        usage: "LABEL"
    - numbackends:
        usage: "GAUGE"
    - xact_commit:
        usage: "COUNTER"
    - xact_rollback:
        usage: "COUNTER"
    - blks_read:
        usage: "COUNTER"
    - blks_hit:
        usage: "COUNTER"

pg_db_size:
  query: |
    SELECT datname, pg_database_size(datname) as size
    FROM pg_database
  metrics:
    - datname:
        usage: "LABEL"
    - size:
        usage: "GAUGE"

pg_stat_activity:
  query: |
    SELECT state, count(*) as count
    FROM pg_stat_activity
    GROUP BY state
  metrics:
    - state:
        usage: "LABEL"
    - count:
        usage: "GAUGE"

pg_locks_count:
  query: |
    SELECT
      COALESCE(datname, 'unknown') as datname,
      mode,
      count(*) as count
    FROM pg_locks pl
    LEFT JOIN pg_database pd ON pl.database = pd.oid
    GROUP BY datname, mode
  metrics:
    - datname:
        usage: "LABEL"
    - mode:
        usage: "LABEL"
    - count:
        usage: "GAUGE"

pg_tables:
  query: |
    SELECT
      relname,
      seq_scan,
      idx_scan,
      n_tup_ins,
      n_tup_upd,
      n_tup_del
    FROM pg_stat_user_tables
  metrics:
    - relname:
        usage: "LABEL"
    - seq_scan:
        usage: "COUNTER"
    - idx_scan:
        usage: "COUNTER"
    - n_tup_ins:
        usage: "COUNTER"
    - n_tup_upd:
        usage: "COUNTER"
    - n_tup_del:
        usage: "COUNTER"

pg_indexes:
  query: |
    SELECT
      relname,
      indexrelname,
      idx_scan
    FROM pg_stat_user_indexes
  metrics:
    - relname:
        usage: "LABEL"
    - indexrelname:
        usage: "LABEL"
    - idx_scan:
        usage: "COUNTER"

# FIXED: no duplicate queryid issues
pg_stat_statements:
  query: |
    SELECT
      queryid,
      SUM(calls) as calls,
      SUM(total_exec_time) as total_exec_time,
      AVG(mean_exec_time) as mean_exec_time
    FROM pg_stat_statements
    GROUP BY queryid
    ORDER BY total_exec_time DESC
    LIMIT 10
  metrics:
    - queryid:
        usage: "LABEL"
    - calls:
        usage: "COUNTER"
    - total_exec_time:
        usage: "COUNTER"
    - mean_exec_time:
        usage: "GAUGE"