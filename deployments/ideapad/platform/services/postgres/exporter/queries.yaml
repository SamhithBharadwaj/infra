pg_up:
  query: "SELECT 1 as up"
  metrics:
    - up:
        usage: "GAUGE"

pg_database:
  query: |
    SELECT
      datname,
      numbackends,
      xact_commit,
      xact_rollback,
      blks_read,
      blks_hit
    FROM pg_stat_database
    WHERE datname NOT IN ('template0','template1')
  metrics:
    - datname:
        usage: "LABEL"
    - numbackends:
        usage: "GAUGE"
    - xact_commit:
        usage: "COUNTER"
    - xact_rollback:
        usage: "COUNTER"
    - blks_read:
        usage: "COUNTER"
    - blks_hit:
        usage: "COUNTER"

pg_db_size:
  query: |
    SELECT
      datname,
      pg_database_size(datname) as size
    FROM pg_database
    WHERE datname NOT IN ('template0','template1')
  metrics:
    - datname:
        usage: "LABEL"
    - size:
        usage: "GAUGE"